# Phase 2 Step 7 — bundle + fixtures regression (no GPU, no corpus download)
name: Phase 2 smoke

on:
  push:
    paths:
      - "evaluation/fixtures/phase2_smoke/**"
      - "evaluation/phase2_task_registry.json"
      - "scripts/phase2_*.py"
      - "scripts/validate_benchmark_corpus.py"
      - "backend/comp-language-model/**"
      - ".github/workflows/phase2-smoke.yml"
  pull_request:
    paths:
      - "evaluation/fixtures/phase2_smoke/**"
      - "evaluation/phase2_task_registry.json"
      - "scripts/phase2_*.py"
      - "scripts/validate_benchmark_corpus.py"
      - "backend/comp-language-model/**"
      - ".github/workflows/phase2-smoke.yml"

jobs:
  phase2-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Phase 2 regression smoke (fixtures)
        run: python scripts/phase2_regression_smoke.py
